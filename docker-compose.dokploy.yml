services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: minusx-backend-prod
    restart: unless-stopped
    volumes:
      - minusx_data:/app/data
    environment:
      - PYTHONUNBUFFERED=1
      - NEXTJS_URL=${NEXTJS_INTERNAL_URL:-http://frontend:3000}
      - BASE_DUCKDB_DATA_PATH=/app
      - WORKERS=${WORKERS:-4}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-http://localhost:3000}
    networks:
      - minusx-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: minusx-frontend-prod
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - minusx_data:/app/data
      - atlas_documents:/app/atlas_documents
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_BACKEND_URL=${NEXT_PUBLIC_BACKEND_URL}
      - BASE_DUCKDB_DATA_PATH=/app
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - AUTH_URL=${AUTH_URL}
      - ADMIN_PWD=${ADMIN_PWD}
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - minusx-network

networks:
  minusx-network:
    driver: bridge

volumes:
  minusx_data:
  atlas_documents:
